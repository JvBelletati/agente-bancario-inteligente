name: Drift Check

# Verifica que a tabela de referência versionada (data/score_limite.csv) continua
# idêntica ao que o gerador scripts/seed_data.py produz — ou seja, que ela não
# "driftou" da sua fonte de verdade.
# (data/clientes.csv NÃO entra aqui: é estado de runtime, mutado pela entrevista de
#  crédito, e por isso não é versionado — ver .gitignore.)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * 1"   # semanalmente, segunda 06:00 UTC
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate seed data
        run: python scripts/seed_data.py

      - name: Verify committed reference table matches the generator (no drift)
        run: git diff --exit-code --ignore-cr-at-eol data/score_limite.csv
